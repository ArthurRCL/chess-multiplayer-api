spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5436/xadrez_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASS:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: ${PORT:8080}

jwt:
  secret: ${JWT_SECRET:xadrez-super-secret-key-must-be-at-least-256-bits-long-for-hs256}
  expiration: 86400000  # 24 horas

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
  api-docs:
    path: /v3/api-docs

logging:
  level:
    com.xadrezonline: DEBUG
    org.springframework.web.socket: INFO
